<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワード検索・閲覧</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
      color: #333;
      background-color: #f8f9fa;
    }

    /* トップコントロールエリア */
    .control-panel {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    .category-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background-color: #f1f3f5;
      padding: 6px;
      border-radius: 8px;
    }

    .category-option {
      position: relative;
    }

    .category-option input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .category-option label {
      display: inline-block;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #495057;
      background-color: #ffffff;
      border: 1px solid #ced4da;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .category-option label:hover {
      border-color: #0066cc;
    }

    .category-option input[type="checkbox"]:checked + label {
      background-color: #0066cc;
      color: #ffffff;
      border-color: #0066cc;
      box-shadow: 0 2px 4px rgba(0, 102, 204, 0.2);
    }

    /* 検索ボックスエリア */
    .search-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-box label {
      font-size: 13px;
      font-weight: bold;
      color: #555;
    }

    /* 入力エリア（縦並び） */
    .search-inputs {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-inputs input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ced4da;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-inputs input:focus {
      border-color: #0066cc;
    }

    .search-info {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    /* メイン表示エリア */
    .content-area {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 2px solid #0066cc;
      padding-bottom: 8px;
    }

    .word-count {
      font-size: 14px;
      color: #666;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .word-card {
      appearance: None;
      -webkit-appearance: none;
      padding: 10px;
      background-color: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 4px;
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }

    .word-card label {
      transition: all 0.2s ease;
    }

    .word-card:hover {
      border-color: #0066cc;
      transition: border-color 0.2s;
    }

    /* .word-card:active {
      background-color: #dcecff;
    } */

    .status-msg {
      color: #666;
      font-style: italic;
    }

    .error-msg {
      color: #d9534f;
    }
  </style>
</head>

<body>
  <div class="control-panel">
    <div class="search-box">
      <label>検索（ひらがな入力）:</label>
      <div class="search-inputs">
        <input type="text" id="search-input-start" placeholder="頭文字" oninput="handleSearch()" disabled>
        <input type="text" id="search-input-end" placeholder="尻文字" oninput="handleSearch()" disabled>
      </div>

      <label>カテゴリ絞り込み（複数可）:</label>
      <div class="category-switch">
        <div class="category-option">
          <input type="checkbox" id="cat-noun" class="cat-checkbox" value="noun" checked onchange="handleSearch()">
          <label for="cat-noun">一般名詞</label>
        </div>
        <div class="category-option">
          <input type="checkbox" id="cat-foreign" class="cat-checkbox" value="foreign" checked onchange="handleSearch()">
          <label for="cat-foreign">外来語</label>
        </div>
        <div class="category-option">
          <input type="checkbox" id="cat-proper" class="cat-checkbox" value="proper" checked onchange="handleSearch()">
          <label for="cat-proper">固有名詞</label>
        </div>
        <div class="category-option">
          <input type="checkbox" id="cat-verb" class="cat-checkbox" value="verb" onchange="handleSearch()">
          <label for="cat-verb">動詞</label>
        </div>
      </div>
    </div>

    <div id="search-info" class="search-info">words.txt を読み込み中...</div>
  </div>

  <div class="content-area">
    <div class="main-header">
      <h2 id="current-title">ワード一覧</h2>
      <span id="word-count" class="word-count"></span>
    </div>
    <div id="word-display" class="status-msg">読み込み中...</div>
  </div>
  <script src="main.js"></script>
</body>
</html>
